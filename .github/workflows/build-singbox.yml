name: Build Singbox.xcframework (sing-box / Speed mode)

# Dedicated job so a sing-box compile failure does NOT turn the main IPA
# build red. Once this is reliably green, link Singbox.xcframework into the
# app (see apple/Package.swift note) and the main build.

on:
  push:
    branches: [main, prismo-rebrand, singbox]
    paths:
      - "singbox/**"
      - "apple/Scripts/build-singbox-xcframework.sh"
      - ".github/workflows/build-singbox.yml"
  workflow_dispatch:

jobs:
  build-singbox:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: singbox/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      - name: Build Singbox.xcframework
        run: ./apple/Scripts/build-singbox-xcframework.sh

      - name: Upload Singbox.xcframework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Singbox-xcframework
          path: apple/Frameworks/Singbox.xcframework
          if-no-files-found: error
          retention-days: 30
